name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: cluverse-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 25
        uses: actions/setup-java@v2
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # ============================================================
      # 롤링 배포: API 인스턴스 1 먼저 배포
      # ============================================================
      - name: Deploy to API Instance 1
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_1 }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "docker stop cluverse-app || true",
                "docker rm cluverse-app || true",
                "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '"$REGISTRY"'",
                "docker pull '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'",
                "docker run -d --name cluverse-app --restart unless-stopped -p 8080:8080 -e JAVA_OPTS=-Xmx256m -e SPRING_DATASOURCE_URL='"'"'jdbc:mysql://${{ secrets.RDS_ENDPOINT }}/cluverse?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true'"'"' -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)
          
          echo "Waiting for API Instance 1 deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_1 }} || true
          
          # 배포 결과 확인
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_1 }} \
            --query 'Status' --output text)
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::API Instance 1 deployment failed with status: $STATUS"
            exit 1
          fi
          echo "API Instance 1 deployed successfully"

      # 인스턴스 1이 정상 기동될 시간 확보
      - name: Wait for API Instance 1 health check
        run: sleep 30

      # ============================================================
      # 롤링 배포: API 인스턴스 2 배포
      # ============================================================
      - name: Deploy to API Instance 2
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_2 }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "docker stop cluverse-app || true",
                "docker rm cluverse-app || true",
                "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '"$REGISTRY"'",
                "docker pull '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'",
                "docker run -d --name cluverse-app --restart unless-stopped -p 8080:8080 -e JAVA_OPTS=-Xmx256m -e SPRING_DATASOURCE_URL='"'"'jdbc:mysql://${{ secrets.RDS_ENDPOINT }}/cluverse?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true'"'"' -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)
          
          echo "Waiting for API Instance 2 deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_2 }} || true
          
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_2 }} \
            --query 'Status' --output text)
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::API Instance 2 deployment failed with status: $STATUS"
            exit 1
          fi
          echo "API Instance 2 deployed successfully"

      - name: Deployment complete
        run: echo "Both API instances deployed successfully with image ${{ github.sha }}"

name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: cluverse-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 25
        uses: actions/setup-java@v2
        with:
          java-version: '25'
          distribution: 'adopt'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      # ============================================================
      # 롤링 배포: API 인스턴스 1 먼저 배포
      # ============================================================
      - name: Deploy to API Instance 1
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_1 }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "docker stop cluverse-app || true",
                "docker rm cluverse-app || true",
                "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '"$REGISTRY"'",
                "docker pull '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'",
                "docker run -d --name cluverse-app --restart unless-stopped -p 8080:8080 -e JAVA_OPTS=-Xmx256m -e SPRING_DATASOURCE_URL='"'"'jdbc:mysql://${{ secrets.RDS_ENDPOINT }}/cluverse_v2?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true'"'"' -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} -e AWS_S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} -e AWS_REGION=ap-northeast-2 -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} -e KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }} -e KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }} -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} -e GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }} '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)

          echo "Waiting for API Instance 1 deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_1 }} || true
          
          # 배포 결과 확인
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_1 }} \
            --query 'Status' --output text)
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::API Instance 1 deployment failed with status: $STATUS"
            exit 1
          fi
          echo "API Instance 1 deployed successfully"

      # 인스턴스 1이 정상 기동될 시간 확보
      - name: Wait for API Instance 1 health check
        run: sleep 30

      # ============================================================
      # 롤링 배포: API 인스턴스 2 배포
      # ============================================================
      - name: Deploy to API Instance 2
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_2 }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "docker stop cluverse-app || true",
                "docker rm cluverse-app || true",
                "aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin '"$REGISTRY"'",
                "docker pull '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'",
                "docker run -d --name cluverse-app --restart unless-stopped -p 8080:8080 -e JAVA_OPTS=-Xmx256m -e SPRING_DATASOURCE_URL='"'"'jdbc:mysql://${{ secrets.RDS_ENDPOINT }}/cluverse_v2?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true'"'"' -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} -e AWS_S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} -e AWS_REGION=ap-northeast-2 -e KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }} -e KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }} -e KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }} -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} -e GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }} '"$REGISTRY"'/'"$ECR_REPOSITORY"':'"${{ github.sha }}"'"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)

          echo "Waiting for API Instance 2 deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_2 }} || true
          
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_2 }} \
            --query 'Status' --output text)
          
          if [ "$STATUS" != "Success" ]; then
            echo "::error::API Instance 2 deployment failed with status: $STATUS"
            exit 1
          fi
          echo "API Instance 2 deployed successfully"

      - name: Deployment complete
        run: echo "Both API instances deployed successfully with image ${{ github.sha }}"

      # ============================================================
      # Prometheus + Alertmanager 배포: nginx 인스턴스
      # ============================================================
      - name: Deploy Prometheus and Alertmanager to nginx instance
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID_NGINX }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "mkdir -p /opt/prometheus /opt/alertmanager",

                "cat > /opt/prometheus/prometheus.yml << '\''PROMEOF'\''",
                "global:",
                "  scrape_interval: 15s",
                "  evaluation_interval: 15s",
                "",
                "rule_files:",
                "  - /etc/prometheus/alert_rules.yml",
                "",
                "alerting:",
                "  alertmanagers:",
                "    - static_configs:",
                "        - targets: ['\''host.docker.internal:9093'\'']",
                "",
                "scrape_configs:",
                "  - job_name: '\''cluverse-api'\''",
                "    metrics_path: '\''/actuator/prometheus'\''",
                "    static_configs:",
                "      - targets:",
                "          - '\''${{ secrets.API_INSTANCE_1_PRIVATE_IP }}:8080'\''",
                "          - '\''${{ secrets.API_INSTANCE_2_PRIVATE_IP }}:8080'\''",
                "        labels:",
                "          app: '\''cluverse-api'\''",
                "PROMEOF",

                "cat > /opt/prometheus/alert_rules.yml << '\''ALERTEOF'\''",
                "groups:",
                "  - name: cluverse-api-alerts",
                "    rules:",
                "      - alert: InstanceDown",
                "        expr: up{job=\"cluverse-api\"} == 0",
                "        for: 30s",
                "        labels:",
                "          severity: critical",
                "        annotations:",
                "          summary: \"Spring 인스턴스 다운: {{ $labels.instance }}\"",
                "          description: \"{{ $labels.instance }}이 30초 이상 응답하지 않습니다.\"",
                "",
                "      - alert: AllInstancesDown",
                "        expr: count(up{job=\"cluverse-api\"} == 1) == 0",
                "        for: 10s",
                "        labels:",
                "          severity: critical",
                "        annotations:",
                "          summary: \"전체 서비스 장애: 모든 Spring 인스턴스 다운\"",
                "          description: \"cluverse-api의 모든 인스턴스가 응답하지 않습니다.\"",
                "",
                "      - alert: HighResponseTime",
                "        expr: rate(http_server_requests_seconds_sum{job=\"cluverse-api\"}[5m]) / rate(http_server_requests_seconds_count{job=\"cluverse-api\"}[5m]) > 3",
                "        for: 2m",
                "        labels:",
                "          severity: warning",
                "        annotations:",
                "          summary: \"응답 지연: {{ $labels.instance }}\"",
                "          description: \"평균 응답 시간이 3초를 초과했습니다.\"",
                "",
                "      - alert: HighHeapUsage",
                "        expr: jvm_memory_used_bytes{area=\"heap\", job=\"cluverse-api\"} / jvm_memory_max_bytes{area=\"heap\", job=\"cluverse-api\"} > 0.85",
                "        for: 2m",
                "        labels:",
                "          severity: warning",
                "        annotations:",
                "          summary: \"힙 메모리 부족: {{ $labels.instance }}\"",
                "          description: \"힙 사용률이 85%%를 초과했습니다.\"",
                "ALERTEOF",

                "cat > /opt/alertmanager/alertmanager.yml << '\''AMEOF'\''",
                "global:",
                "  resolve_timeout: 5m",
                "  slack_api_url: '\''${{ secrets.SLACK_WEBHOOK_URL }}'\''",
                "",
                "route:",
                "  receiver: '\''slack-critical'\''",
                "  group_by: ['\''alertname'\'', '\''instance'\'']",
                "  group_wait: 10s",
                "  group_interval: 5m",
                "  repeat_interval: 1h",
                "  routes:",
                "    - match:",
                "        severity: warning",
                "      receiver: '\''slack-warning'\''",
                "    - match:",
                "        severity: critical",
                "      receiver: '\''slack-critical'\''",
                "",
                "receivers:",
                "  - name: '\''slack-critical'\''",
                "    slack_configs:",
                "      - channel: '\''#server-alerts'\''",
                "        title: '\''[CRITICAL] {{ .GroupLabels.alertname }}'\''",
                "        text: '\''{{ range .Alerts }}{{ .Annotations.summary }}\\n{{ .Annotations.description }}\\n{{ end }}'\''",
                "        send_resolved: true",
                "  - name: '\''slack-warning'\''",
                "    slack_configs:",
                "      - channel: '\''#server-alerts'\''",
                "        title: '\''[WARNING] {{ .GroupLabels.alertname }}'\''",
                "        text: '\''{{ range .Alerts }}{{ .Annotations.summary }}\\n{{ .Annotations.description }}\\n{{ end }}'\''",
                "        send_resolved: true",
                "AMEOF",

                "docker stop alertmanager || true",
                "docker rm alertmanager || true",
                "docker run -d --name alertmanager --restart unless-stopped -p 9093:9093 -v /opt/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml prom/alertmanager:latest",

                "docker stop prometheus || true",
                "docker rm prometheus || true",
                "docker run -d --name prometheus --restart unless-stopped --add-host=host.docker.internal:host-gateway -p 9090:9090 -v /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml -v /opt/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml prom/prometheus:latest"
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)

          echo "Waiting for Prometheus + Alertmanager deployment..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_NGINX }} || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID_NGINX }} \
            --query 'Status' --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Prometheus + Alertmanager deployment failed with status: $STATUS"
            exit 1
          fi
          echo "Prometheus + Alertmanager deployed successfully"

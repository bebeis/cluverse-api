spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false
    open-in-view: false

decorator:
  datasource:
    p6spy:
      enable-logging: false

app:
  frontend-url: http://localhost:3000

oauth2:
  kakao:
    client-id: test
    client-secret: test
    redirect-uri: http://localhost:8080/oauth2/kakao/callback
  google:
    client-id: test
    client-secret: test
    redirect-uri: http://localhost:8080/oauth2/google/callback

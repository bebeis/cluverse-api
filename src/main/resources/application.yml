server:
  forward-headers-strategy: native
  tomcat:
    threads:
      max: 400
    connection-timeout: 120000
  servlet:
    session:
      timeout: 1800s               # 슬라이딩 세션 - 요청마다 갱신
      cookie:
        http-only: true
        same-site: none
        secure: true

spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/cluverse_v2?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: cluverse_user
    password: ${RDS_PASSWORD:test1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        show_sql: false
    open-in-view: false

decorator:
  datasource:
    p6spy:
      enable-logging: false # 운영 환경에선 끄기
      multiline: true
      logging: slf4j

logging:
  level:
    org.springframework: info

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,info,prometheus"
  endpoint:
    health:
      show-details: always  # 상세한 헬스 정보 표시


aws:
  s3:
    bucket: ${AWS_S3_BUCKET_NAME:cluverse-images}
    endpoint: ""   # 기본값 없음 = AWS 실제 엔드포인트 사용 (운영)
  region: ap-northeast-2

app:
  frontend-url: ${FRONTEND_URL:https://cluverse-web.vercel.app}

oauth2:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

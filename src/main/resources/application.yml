spring:
  datasource:
    url: jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/cluverse?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: cluverse_user
    password: ${RDS_PASSWORD:test1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 32
  # // TODO: Named Lock 을 위해 아래 주석을 해제해야함
  #    hikari:
  #      maximum-pool-size: 64
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

decorator:
  datasource:
    p6spy:
      enable-logging: true # 운영 환경에선 끄기
      multiline: true
      logging: slf4j

logging:
  level:
    org.springframework: info
# TODO: BulkInsert 모니터링 - 아래 주석을 해제해야함
#    com.mysql.cj: trace

management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,info,prometheus"
  endpoint:
    health:
      show-details: always  # 상세한 헬스 정보 표시

server:
  tomcat:
    connection-timeout: 120000      # 120초
  servlet:
    session:
      timeout: 120s                # 세션 타임아웃
